<script>
function bukaUndangan() {

  let video = document.getElementById("mainVideo");

  // play musik
  musik.play().catch(() => {});

  // paksa video play
  let playPromise = video.play();

video.classList.add("show");

  if (playPromise !== undefined) {
    playPromise.catch(() => {
      console.log("Autoplay diblok, coba klik manual");
    });
  }
}
</script>

<script>
const url = "https://script.google.com/macros/s/AKfycbxxNz4xteV8_SJ__yA6YtJyvjFFigRdv8ZOUxO5bJPLfdP3OMrjHqWG4LVOsAS4iFtF/exec";

function kirim(status) {
  let nama = document.getElementById("nama").value.trim();
  let pesan = document.getElementById("pesan").value.trim();

  if(nama === "") {
    alert("Nama wajib diisi!");
    return;
  }

  fetch(url, {
    method: "POST",
    body: JSON.stringify({nama, pesan, status})
  })
  .then(() => {
    document.getElementById("nama").value = "";
    document.getElementById("pesan").value = "";
    tampil();
  })
  .catch(err => {
    alert("Gagal kirim!");
    console.log(err);
  });
}

function tampil() {
  fetch(url)
    .then(res => res.json())
    .then(data => {

      let hadir = 0;
      let tidak = 0;
      let html = "";

      data.slice(1).forEach(d => {
        if(d[2] === "Hadir") hadir++;
        else tidak++;

        html += `
<tr>
  <td class="nama">${d[0]}</td>
  <td class="${d[2] === 'Hadir' ? 'hadir' : 'tidak'}">${d[2]}</td>
  <td class="ucapan">${d[1]}</td>
</tr>
`;
      });

      document.getElementById("hadir").innerText = hadir;
      document.getElementById("tidak").innerText = tidak;
      document.getElementById("list").innerHTML = html;
    })
    .catch(err => console.log(err));
}

tampil();
</script>

<script>
// ✨ SCRIPT BARU (sparkle tadi)
function tambahSparkle(wrapper) {
  for(let i = 0; i < 8; i++) {
    let s = document.createElement("div");
    s.className = "sparkle";

    s.style.left = Math.random() * 100 + "%";
    s.style.top = Math.random() * 100 + "%";
    s.style.animationDelay = (Math.random() * 2) + "s";

    wrapper.appendChild(s);
  }
}

let wrappers = document.querySelectorAll(".img-wrapper");

window.addEventListener("scroll", function() {
  let trigger = window.innerHeight;

  wrappers.forEach(wrap => {
    let img = wrap.querySelector("img, video");
    let top = wrap.getBoundingClientRect().top;

    if(top < trigger - 100) {
      img.classList.add("show");
video.classList.add("show");

      if(!wrap.classList.contains("sparkle-added")) {
        tambahSparkle(wrap);
        wrap.classList.add("sparkle-added");
      }
    }
  });
});
</script>

<script>
function createLeaf() {
  let leaf = document.createElement("div");
  leaf.className = "leaf";

  leaf.style.left = Math.random() * 100 + "vw";

  // 🔥 ukuran lebih besar & bervariasi
  let size = 40 + Math.random() * 40; // 40px – 80px
  leaf.style.width = size + "px";
  leaf.style.height = size + "px";

  leaf.style.animationDuration = (6 + Math.random() * 4) + "s";
  leaf.style.opacity = 0.7 + Math.random() * 0.3;
leaf.style.transform = `rotate(${Math.random() * 360}deg)`;

  document.body.appendChild(leaf);

  setTimeout(() => {
    leaf.remove();
  }, 10000);
}

// bikin daun jatuh terus
setInterval(createLeaf, 800);
</script>

<script>
// === TAMPILKAN NAMA TAMU DI COVER ===
function getParameterByName(name) {
  let url = window.location.href;
  name = name.replace(/[\[\]]/g, "\\$&");
  let regex = new RegExp("[?&]" + name + "(=([^&#]*)|&|#|$)"),
      results = regex.exec(url);
  if (!results) return null;
  if (!results[2]) return '';
  return decodeURIComponent(results[2].replace(/\+/g, " "));
}

window.addEventListener("DOMContentLoaded", () => {
  let nama = getParameterByName('nama');
  let pasangan = getParameterByName('pasangan');

  if(nama) {
    let cover = document.getElementById('cover');
    let h2 = document.createElement('h2');
h2.className = 'nama-tamu';
    h2.style.fontSize = '24px';
    h2.style.color = 'gold';
    h2.style.marginBottom = '10px';

let text = "Kepada Yth.\nBapak/Ibu/Saudara/i\n\n";

if(pasangan) {
  text += `${nama} & ${pasangan}`;
} else {
  text += nama;
}

h2.innerText = text;
let guestBox = document.getElementById('guestContainer');
guestBox.appendChild(h2);  }
});
</script>

<script>
const targetDate = new Date("April 12, 2026 09:00:00").getTime();

setInterval(() => {
  let now = new Date().getTime();
  let selisih = targetDate - now;

  let hari = Math.floor(selisih / (1000 * 60 * 60 * 24));
  let jam = Math.floor((selisih / (1000 * 60 * 60)) % 24);
  let menit = Math.floor((selisih / (1000 * 60)) % 60);
  let detik = Math.floor((selisih / 1000) % 60);

  document.getElementById("countdown").innerHTML = `
    <div class="time-box"><span>${hari}</span><small>Hari</small></div>
    <div class="time-box"><span>${jam}</span><small>Jam</small></div>
    <div class="time-box"><span>${menit}</span><small>Menit</small></div>
    <div class="time-box"><span>${detik}</span><small>Detik</small></div>
  `;
}, 1000);
</script>

  <script>
function toggleVideo(e) {
  e.stopPropagation(); // 🔥 biar ga ikut klik scroll

  let video = document.getElementById("mainVideo");
  let btn = document.getElementById("videoControl");

  if (video.paused) {
    video.play();
    btn.innerText = "⏸ Pause";
  } else {
    video.pause();
    btn.innerText = "▶ Play";
  }
}
</script>
